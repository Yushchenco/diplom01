<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love letter for crush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <!--<link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap"
      rel="stylesheet" />-->
    <link rel="stylesheet" href="style.css" />
  </head>
  <audio id="autoplay" loop>
    <source src="prom.mp3" type="audio/mpeg">
  </audio>
  <body>
    <div class="aurora"></div>
    <div class="stars"></div>
    <div class="particles"></div>
    <!-- tiktok meowish -->
    <div class="envlope-wrapper">
      <div id="envelope" class="close">
        <div class="front flap"></div>
        <div class="front pocket"></div>
        
        <div class="letter">
          <div class="letter-content">
            <h3>Шановні викладачі та викладачки!</h3>

            <p>
              Запрошуємо вас на урочисте вручення дипломів випускникам 2026 року.
            </p>

            <p>📅 16 липня 2026 року</p>
            <p>🕚 11:00</p>
            <p>📍 Бібліотека Університету Ушинського</p>

            <p class="signature">
              З любов'ю та вдячністю,<br />
              ваші студенти ❤️
              print("Дякуємо, викладачі!")
            </p>
          </div>
          <div class="code-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>

            <span class="filename">graduation.py</span>
          </div>
        </div>
        <div class="hearts">
          <div class="heart a1"></div>
          <div class="heart a2"></div>
          <div class="heart a3"></div>
        <div class="symbols">
          <span>{ }</span>
          <span>&lt;/&gt;</span>
          <span>🐍</span>
        </div>
        </div>
      </div>
    </div>
    <div class="reset">
      <button id="open">Open</button>
      <button id="reset">Close</button>
    </div>
    <div class="cursor-glow"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
